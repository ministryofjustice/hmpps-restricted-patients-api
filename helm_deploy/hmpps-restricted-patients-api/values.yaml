generic-service:
  nameOverride: hmpps-restricted-patients-api
  productId: DPS066

  serviceAccountName: hmpps-restricted-patients-api

  replicaCount: 4

  image:
    repository: ghcr.io/ministryofjustice/hmpps-restricted-patients-api
    tag: app_version # override at deployment time
    port: 8080

  ingress:
    enabled: true
    host: app-hostname.local # override per environment
    tlsSecretName: hmpps-restricted-patients-api-cert
    modsecurity_enabled: true
    modsecurity_snippet: |
      SecRuleEngine On
      # team here grants access to the OpenSearch logs to delve into the cause of the blockage
      SecDefaultAction "phase:2,pass,log,tag:github_team=syscon-devs,tag:namespace={{ .Release.Namespace }}"
      # Default is only GET HEAD POST OPTIONS so need to include PUT etc.
      SecAction "id:900200,phase:1,nolog,pass,t:none,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE,setvar:tx.paranoia_level=3"
      # Do not scan request body - triggered by upload
      SecRuleUpdateTargetById 920272 "!REQUEST_BODY"
      # Block Detectify scanner with 418
      SecRule REQUEST_HEADERS:User-Agent "@pm detectify Detectify DETECTIFY" "id:800003,phase:1,deny,status:418,log,tag:github_team=syscon-devs,tag:namespace={{ .Release.Namespace }}"
      # Change default denial to be a 406 so that we can tell easily that it is modsecurity doing the blocking
      SecRuleUpdateActionById 949110 "t:none,deny,status:406,logdata:%{SERVER_NAME}"
      SecRuleUpdateActionById 959100 "t:none,deny,status:406,logdata:%{SERVER_NAME}"
  

  # Environment variables to load into the deployment
  env:
    SERVER_PORT: "8080"
    SPRING_PROFILES_ACTIVE: "postgres,logstash"
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: applicationinsights.json

  # Pre-existing kubernetes secrets to load as environment variables in the deployment.
  # namespace_secrets:
  #   [name of kubernetes secret]:
  #     [name of environment variable as seen by app]: [key of kubernetes secret to load]

  namespace_secrets:
    hmpps-restricted-patients-api-application-insights:
      APPLICATIONINSIGHTS_CONNECTION_STRING: "APPLICATIONINSIGHTS_CONNECTION_STRING"
    hmpps-restricted-patients-api-client-creds:
      RESTRICTED_PATIENTS_API_CLIENT_ID: "API_CLIENT_ID"
      RESTRICTED_PATIENTS_API_CLIENT_SECRET: "API_CLIENT_SECRET"
    hmpps-domain-events-topic:
      HMPPS_SQS_TOPICS_DOMAINEVENTSOUTBOUND_ARN: "topic_arn"
    rp-rds-instance-output:
      DATABASE_ENDPOINT: "rds_instance_endpoint"
      DATABASE_NAME: "database_name"
      DATABASE_USERNAME: "database_username"
      DATABASE_PASSWORD: "database_password"
    prison-events-restricted-patients-queue:
      HMPPS_SQS_QUEUES_OFFENDEREVENTS_QUEUE_NAME: "sqs_queue_name"
    prison-events-restricted-patients-dlq:
      HMPPS_SQS_QUEUES_OFFENDEREVENTS_DLQ_NAME: "sqs_queue_name"
    domain-events-restricted-patients-queue:
      HMPPS_SQS_QUEUES_DOMAINEVENTS_QUEUE_NAME: "sqs_queue_name"
    domain-events-restricted-patients-dlq:
      HMPPS_SQS_QUEUES_DOMAINEVENTS_DLQ_NAME: "sqs_queue_name"

  allowlist:
    groups:
      - internal

  # The name has max length of 22 chars (Cronjob name max length is 52 chars, including prefix "hmpps-restricted-patients-api-")
  # The type must exist in enum BatchType
  batchjobs:
    - name: past-date-check
      type: PAST_DATE_CHECK
      schedule: "0 3 * * *"

generic-prometheus-alerts:
  alertSeverity: syscon
  targetApplication: hmpps-restricted-patients-api
  sqsAlertsTotalMessagesThreshold: "0"
