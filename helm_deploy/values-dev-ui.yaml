---
# Per environment values which override defaults in hmpps-restricted-patients-api/values.yaml

generic-service:
  replicaCount: 2

  ingress:
    host: restricted-patients-api-dev.prison.service.justice.gov.uk
    className: modsec-non-prod

  env:
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: applicationinsights.dev.json
    PRISON_API_ENDPOINT_URL: https://prison-api-dev.prison.service.justice.gov.uk
    PRISONER_SEARCH_API_ENDPOINT_URL: https://prisoner-search-dev.prison.service.justice.gov.uk
    OAUTH_ENDPOINT_URL: https://sign-in-dev.hmpps.service.justice.gov.uk/auth
    SPRINGDOC_API-DOCS_ENABLED: "true"
    SPRINGDOC_SWAGGER-UI_ENABLED: "true"
    APPLICATION_SUBSCRIBERS_ENABLED: "true"

  namespace_secrets:
    rp-rds-instance-output:
      DATABASE_ENDPOINT: "rds_instance_endpoint"
      DATABASE_NAME: "database_name"
      DATABASE_USERNAME: "database_username"
      DATABASE_PASSWORD: "database_password"

  scheduledDowntime:
    enabled: true
    startup: '24 6 * * 1-5' # Start at 6.24am UTC Monday-Friday
    shutdown: '48 21 * * 1-5' # Stop at 9.48`pm UTC Monday-Friday

  batchjobs:
    - name: past-date-check
      type: PAST_DATE_CHECK
      schedule: "0 15 * * 1-5"

# CloudPlatform AlertManager receiver to route prometheus alerts to slack
generic-prometheus-alerts:
  businessHoursOnly: true
  alertSeverity: syscon-nonprod
  sqsNumberAlertQueueNames:
    - "dps-core-dev-restricted_patients_domain_queue"
    - "dps-core-dev-restricted_patients_domain_dlq"
    - "dps-core-dev-restricted_patients_offender_queue"
    - "dps-core-dev-restricted_patients_offender_dlq"

environment: dev
